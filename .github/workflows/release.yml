name: Release

on:
  release:
    types: [ published ]

env:
  NODE_VERSION: '22.x'

jobs:
  release:
    name: Worker Release Prep
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        registry-url: 'https://registry.npmjs.org'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Generate Worker types
      run: npm run cf-typegen

    - name: Validate release branch
      run: npm run type-check

    - name: Release note
      run: echo "Release workflow now validates the Cloudflare Worker project. Deployment should happen via Wrangler."
